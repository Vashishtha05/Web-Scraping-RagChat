<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocChat — PDF Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 min-h-screen">

    <!-- Gradient blobs -->
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-cyan-500/10 rounded-full blur-3xl"></div>
    </div>

    <!-- Nav -->
    <nav class="w-full px-6 py-5 flex items-center justify-between max-w-6xl mx-auto">
        <a href="/" class="flex items-center gap-2 hover:opacity-80 transition">
            <span class="text-2xl">📄</span>
            <span class="text-white font-bold text-xl tracking-tight">DocChat</span>
        </a>
        <div class="flex items-center gap-3">
            <a href="/chat"
               class="text-slate-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg border border-slate-700 hover:border-slate-500 transition">
                Back to Chat &rarr;
            </a>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-5xl mx-auto px-6 py-8">

        <div class="mb-6">
            <h1 class="text-2xl font-bold text-white mb-2">📑 PDF Viewer</h1>
            <p class="text-slate-400 text-sm">Preview the embedded document below. This is the source material used by the RAG pipeline for answering your questions.</p>
        </div>

        <!-- PDF embed -->
        <div class="bg-slate-900/60 backdrop-blur border border-slate-700/60 rounded-2xl overflow-hidden shadow-xl">
            <div class="px-6 py-3 border-b border-slate-700/50 flex items-center gap-2">
                <div class="w-3 h-3 bg-red-400 rounded-full"></div>
                <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
                <div class="w-3 h-3 bg-green-400 rounded-full"></div>
                <span class="ml-2 text-slate-500 text-xs font-mono">document.pdf</span>
            </div>
            <embed src="https://media.geeksforgeeks.org/wp-content/cdn-uploads/20210101201653/PDF.pdf"
                   class="w-full" style="height: 80vh;">
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-slate-600 text-xs">
        Built with Flask, LangChain & Ollama &middot; A personal RAG project
    </footer>

</body>

</html>
